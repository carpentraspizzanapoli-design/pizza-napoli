<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Style DSLR — Pizza Napoli</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:#080808; color:#fff; font-family:Georgia,serif; padding:40px 20px; }
  h1 { text-align:center; color:#d4af37; font-size:20px; letter-spacing:5px; margin-bottom:6px; font-weight:normal; }
  .sub { text-align:center; color:#555; font-size:12px; letter-spacing:2px; margin-bottom:40px; }
  .section { margin-bottom:50px; }
  .section-title { color:#d4af37; font-size:13px; letter-spacing:3px; margin-bottom:16px; padding-left:4px; border-left:3px solid #d4af37; padding-left:12px; }
  .row { display:flex; gap:20px; justify-content:center; flex-wrap:wrap; }
  .card { width:340px; }
  .card img { width:100%; display:block; border-radius:3px; }
  .card p { color:#666; font-size:11px; text-align:center; margin-top:8px; letter-spacing:1px; }
  .vs { text-align:center; color:#333; font-size:11px; letter-spacing:2px; margin:20px 0; }
</style>
</head>
<body>
<h1>RENDU DSLR FOOD PHOTOGRAPHY</h1>
<p class="sub">Warmth · Netteté selective · Profondeur de champ · Vignette naturelle</p>

<div class="section">
  <p class="section-title">SAINT-JACQUES</p>
  <div class="row">
    <div class="card"><img src="dslr-saint-jacques-watermark.jpg"><p>Logo discret coin bas-droit</p></div>
    <div class="card"><img src="dslr-saint-jacques-bande.jpg"><p>Bande logo centré bas</p></div>
  </div>
</div>

<div class="section">
  <p class="section-title">ROYALE</p>
  <div class="row">
    <div class="card"><img src="dslr-royale-watermark.jpg"><p>Logo discret coin bas-droit</p></div>
    <div class="card"><img src="dslr-royale-bande.jpg"><p>Bande logo centré bas</p></div>
  </div>
</div>

<div class="section">
  <p class="section-title">TARTUFO</p>
  <div class="row">
    <div class="card"><img src="dslr-tartufo-watermark.jpg"><p>Logo discret coin bas-droit</p></div>
    <div class="card"><img src="dslr-tartufo-bande.jpg"><p>Bande logo centré bas</p></div>
  </div>
</div>

</body>
</html>
